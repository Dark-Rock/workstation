# =============================================================================
# wkst package manifest — single source of truth for cross-platform tooling.
#
# Each [[package]] declares per-backend identifiers. wkst picks the preferred
# backend per platform (see wkst.manifest.BACKEND_PRIORITY).
#
# Schema:
#   name         (required) Logical tool name
#   binary       Executable name on PATH (defaults to `name`); used by `wkst doctor`
#   groups       List of group tags; consumed by `wkst install --groups=...`
#   platforms    Restrict to ["macos"] or ["linux-debian"] (default: both)
#   exclude_variants  Skip on platform variants such as ["wsl"]
#   description  Short human description
#   brew         Homebrew formula or cask name
#   brew_type    "formula" (default) or "cask"
#   apt          APT package name
#   cargo        cargo install crate name (used as fallback)
#   npm          npm install -g name (used as fallback)
#   pipx         pipx install name (used as fallback)
# =============================================================================

[meta]
description = "Cross-platform workstation manifest"
updated = "2026-06-28"

[profiles]
# User-facing install menu presets. Keep these as group lists so adding/removing
# packages only needs package-level group tagging.
minimal = ["core", "shell", "terminal", "search", "git"]
developer = ["core", "languages", "shell", "terminal", "search", "git", "editor", "quality", "dev"]
sre = ["core", "languages", "shell", "terminal", "search", "git", "editor", "quality", "dev", "k8s", "containers", "system", "api", "db", "secrets", "iac"]
full = ["*"]

