# ==================================================
# GENERAL SETTINGS
# ==================================================
set -g mouse on
set -g prefix C-s
unbind C-b

# Start windows and panes at 1, not 0 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Focus events - required for neovim autoread/autowrite inside tmux
set -g focus-events on

# Increase scrollback buffer
set -g history-limit 50000

# Display messages for 2 seconds
set -g display-time 2000

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ==================================================
# TERMINAL SETTINGS
# ==================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"        # True color support
set -as terminal-features ",*:cursor"     # Cursor shape changes

# ==================================================
# VI MODE SETTINGS
# ==================================================
set-window-option -g mode-keys vi
set -sg escape-time 0  # Instant ESC response (was 10ms)

# Vi-style copy mode keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# y and Enter handled by tmux-yank plugin (avoids conflict with manual pbcopy)

# ==================================================
# PANE NAVIGATION (VIM-STYLE)
# ==================================================
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ==================================================
# PANE RESIZING (VIM-STYLE)
# ==================================================
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ==================================================
# WINDOW & PANE SPLITTING
# ==================================================
bind | split-window -h -c "#{pane_current_path}"  # Split horizontal (vim-style)
bind - split-window -v -c "#{pane_current_path}"  # Split vertical (vim-style)
unbind '"'
unbind %

# Quick pane operations
bind x kill-pane                              # Kill pane without confirmation
bind X kill-window                            # Kill window without confirmation
bind z resize-pane -Z                         # Toggle pane zoom
bind Tab last-window                          # Toggle to last window
bind C-s last-pane                            # Toggle to last pane (with prefix)

# ==================================================
# SHELL CONFIGURATION
# ==================================================
# Use current shell (dynamically detected)
set -g default-shell "$SHELL"
set -g default-command "$SHELL"
set -g update-environment -r

# ==================================================
# ACTIVITY MONITORING
# ==================================================
setw -g monitor-activity on
set -g visual-activity off  # Don't show "Activity in window X" messages

# ==================================================
# SESSION MANAGEMENT
# ==================================================
bind C-c new-session                          # Create new session
bind C-f command-prompt -p "find-session:" "switch-client -t %%"  # Find session
bind BTab switch-client -l                    # Toggle to last session

# Quick session switching
bind -n M-p switch-client -p                  # Alt-p: previous session
bind -n M-n switch-client -n                  # Alt-n: next session

# Window management
bind -n M-H previous-window                   # Alt-Shift-H: previous window
bind -n M-L next-window                       # Alt-Shift-L: next window

# ==================================================
# PLUGINS (TPM)
# ==================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sensible defaults (load first)
set -g @plugin 'tmux-plugins/tmux-yank'          # Better copy/paste
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save sessions
set -g @plugin 'fcsonline/tmux-thumbs'           # Copy/paste URLs/paths with hints
set -g @plugin 'sainnhe/tmux-fzf'                # FZF integration for session/window switching
set -g @plugin 'catppuccin/tmux'                 # Theme

# ==================================================
# PLUGIN CONFIGURATION
# ==================================================
# Catppuccin theme
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default"

# Custom status modules for SRE workflow
# set -g @catppuccin_kube_text " #(kubectl config current-context 2>/dev/null | cut -d'-' -f1 || echo 'no-ctx')"
# set -g @catppuccin_kube_icon "󱃾 "
# set -g @catppuccin_host_text " #(hostname -s)"
# set -g @catppuccin_host_icon ""
set -g @catppuccin_directory_text " #{b:pane_current_path}"

# Resurrect/Continuum settings (for multi-project workflow)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'        # Save nvim sessions
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'             # Auto-save every 15 minutes

# Tmux-thumbs configuration (for quick URL/path copying)
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && tmux paste-buffer'

# Tmux-fzf configuration
set -g @tmux-fzf-launch-key 'C-f'                # Prefix + Ctrl-f for fzf menu

# ==================================================
# STATUS BAR (SRE-optimized)
# ==================================================
set-option -g status-position top
set -g status-interval 5                         # Update every 5 seconds
set -g status-right-length 150
set -g status-left-length 100

# Status bar modules (left: session, right: k8s context, host, directory, time)
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"

set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_application}"
# set -ag status-right "#{E:@catppuccin_status_kube}"
# set -ag status-right "#{E:@catppuccin_status_host}"
# set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_directory}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
